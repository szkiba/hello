name: CI

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  prerequisites:
    name: Prerequisites
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Check vars.GO_VERSION
        run: test -n "${{vars.GO_VERSION}}"

      - name: Check vars.GO_VERSIONS
        run: test -n "${{vars.GO_VERSIONS}}"

      - name: Check vars.GOLANGCI_LINT_VERSION
        run: test -n "${{vars.GOLANGCI_LINT_VERSION}}"
        
      - name: Check vars.GORELEASER_VERSION
        run: test -n "${{vars.GORELEASER_VERSION}}"

      - name: Check secrets.CODECOV_TOKEN
        run: test -n "${{secrets.CODECOV_TOKEN}}"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: ["prerequisites"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go ${{ vars.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: "${{ vars.GO_VERSION }}"

      - name: Check module dependencies
        shell: bash
        run: |
          go version
          test -z "$(go mod tidy && git status go.* --porcelain)"
          go mod verify
 
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: "${{ vars.GOLANGCI_LINT_VERSION }}"
          only-new-issues: true

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: ["prerequisites"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go ${{ vars.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: "${{ vars.GO_VERSION }}"

      - name: Run tests
        run: |
          go test -short ./...

  test:
    name: Test
    needs:
      - lint
      - smoke
    strategy:
      fail-fast: false
      matrix:
        go-version: ${{ fromJSON(vars.GO_VERSIONS) }}
        platform: ${{ fromJSON(vars.PLATFORMS) }}
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: |
          go test -race -timeout 60s ./...

  build:
    name: Build
    needs:
      - lint
      - smoke
    strategy:
      fail-fast: false
      matrix:
        go-version: ${{ fromJSON(vars.GO_VERSIONS) }}
        platform: ${{ fromJSON(vars.PLATFORMS) }}
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: GoReleaser build
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "${{ vars.GORELEASER_VERSION }}"
          args: build --clean --snapshot --single-target

      - name: Setup Bats
        if: ${{ hashFiles('.github/ci.bats') != '' }}
        id: setup-bats
        uses: bats-core/bats-action@3.0.0

      - name: Test Snapshot
        if: ${{ hashFiles('.github/ci.bats') != '' }}
        run: bats .github/ci.bats

  report:
    name: Report
    needs:
      - test
      - build
    if: ${{ github.ref_name == 'main' || github.ref_name == 'master' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go ${{vars.GO_VERSION}}
        uses: actions/setup-go@v5
        with:
          go-version: "${{vars.GO_VERSION}}"

      - name: Test
        run: go test -count 1 -coverprofile=coverage.txt ./...

      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{secrets.CODECOV_TOKEN}}
          slug: ${{github.repository}}

      - name: Generate Go Report Card
        uses: creekorful/goreportcard-action@v1.0

  devcontainer:
    name: DevContainer
    if: ${{ vars.DEVCONTAINER_IMAGE != '' }}
    needs: ["prerequisites"]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Config
        run: |
          cat .devcontainer/devcontainer.json | jq -r '
            {
              IMAGE: .image,
              GO_VERSION: .features["ghcr.io/devcontainers/features/go:1"]["version"],
              GOLANGCI_LINT_VERSION: .features["ghcr.io/devcontainers/features/go:1"]["golangciLintVersion"],
              GORELEASER_VERSION: .features["ghcr.io/guiyomh/features/goreleaser:0"]["version"]
            } | to_entries | map("\(.key)=\(.value|tostring)")|.[]' >> "$GITHUB_ENV"

      - name: Check DevContainer image ${{vars.DEVCONTAINER_IMAGE}}
        run: test "${{env.IMAGE}}" == "${{vars.DEVCONTAINER_IMAGE}}"

      - name: Check go version ${{vars.GO_VERSION}}
        run: test "${{env.GO_VERSION}}" == "$(echo ${{vars.GO_VERSION}}|sed -e 's/\.x//g')"

      - name: Check golangci-lint version ${{vars.GOLANGCI_LINT_VERSION}}
        run: test "${{env.GOLANGCI_LINT_VERSION}}" == "$(echo ${{vars.GOLANGCI_LINT_VERSION}}|sed -e 's/v//g')"
        
      - name: Check goreleaser version ${{vars.GORELEASER_VERSION}}
        run: test "${{env.GORELEASER_VERSION}}" == "${{vars.GORELEASER_VERSION}}"
